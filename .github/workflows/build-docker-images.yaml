name: Build Docker Images

on:
  workflow_call:
    inputs:
      version:
        description: "Semantic version to build"
        required: true
        type: string

      environment:
        description: "Target environment (dev|staging|prod)"
        required: true
        type: string

      release_bucket_name:
        description: "GCS bucket where build artifacts are stored"
        required: false
        type: string
        default: vegito-app-${{ inputs.environment }}-github-actions-ci-artifacts-private

      release_bucket_prefix:
        description: "Prefix path inside the bucket (usually repository name)"
        required: false
        type: string
        default: ${{ github.repository }}

    secrets:
      GOOGLE_CLOUD_PROJECT_ID:
        required: true

      WORKLOAD_IDENTITY_PROVIDER:
        required: true

      GOOGLE_CLOUD_SA_KEY_GITHUB_ACTIONS_MAIN:
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  build:
    env:
      VERSION: ${{ inputs.version }}
      GOOGLE_CLOUD_PROJECT_ID: ${{ secrets.GOOGLE_CLOUD_PROJECT_ID }}
      INFRA_ENV: ${{ inputs.environment }}
    environment: ${{ inputs.environment }}
    name: Build & Push Docker Image
    runs-on: self-hosted
    outputs:
      image_tags_md: ${{ steps.docker_tags.outputs.tags_md }}

    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GOOGLE_CLOUD_SA_KEY_GITHUB_ACTIONS_MAIN }}
          project_id: ${{ secrets.GOOGLE_CLOUD_PROJECT_ID }}
          token_format: "access_token"
          export_environment_variables: true

      - name: Configure Cloud SDK and Docker
        run: |
          make gcloud-config-set-project
          make gcloud-auth-docker
          make docker-buildx-setup

      - name: Build Docker image
        run: |
          set -o pipefail
          make images-ci 2>&1 | tee images-build.log

      - name: Upload images-build.log to GCS
        run: |
          BUCKET="${{ inputs.release_bucket_name }}"
          PREFIX="${{ inputs.release_bucket_prefix }}"
          VERSION="${{ inputs.version }}"

          if ! gcloud storage cp images-build.log "gs://${BUCKET}/${PREFIX}/${VERSION}/images-build.log" ; then
            echo "::warning::upload failed for images-build.log"
          fi

      - name: Generate docker image tag list for ${{ inputs.environment }}
        id: docker_tags
        run: |
          make docker-build-tags-list-ci-md > docker-tags.md
          echo "tags_md<<EOF" >> $GITHUB_OUTPUT
          cat docker-tags.md >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Upload docker-tags.md to GCS
        run: |
          BUCKET="${{ inputs.release_bucket_name }}"
          PREFIX="${{ inputs.release_bucket_prefix }}"
          VERSION="${{ inputs.version }}"

          if ! gcloud storage cp docker-tags.md "gs://${BUCKET}/${PREFIX}/${VERSION}/docker-tags.md" ; then
            echo "::warning::upload failed for docker-tags.md"
          fi

      - name: Generate build metadata
        run: |
          set -euo pipefail

          BUCKET="${{ inputs.release_bucket_name }}"
          PREFIX="${{ inputs.release_bucket_prefix }}"
          VERSION="${{ inputs.version }}"

          BASE_URL="https://storage.googleapis.com/${BUCKET}/${PREFIX}/${VERSION}"

          cat <<EOF > build-metadata.json
          {
            "buildLog": "${BASE_URL}/images-build.log",
            "buildImagesLog": "${BASE_URL}/images-build.log",
            "dockerTags": "${BASE_URL}/docker-tags.md"
          }
          EOF

      - name: Upload build metadata
        run: |
          BUCKET="${{ inputs.release_bucket_name }}"
          PREFIX="${{ inputs.release_bucket_prefix }}"
          VERSION="${{ inputs.version }}"

          if ! gcloud storage cp build-metadata.json "gs://${BUCKET}/${PREFIX}/${VERSION}/build-metadata.json" ; then
            echo "::warning::upload failed for build-metadata.json"
          fi