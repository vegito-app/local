name: Version Finalize (Reusable)

on:
  workflow_call:
    inputs:
      release_branch:
        type: string
        default: main

      environment:
        description: "The environment to deploy to (e.g., prod, staging)"
        type: string
        required: true

      version:
        description: "Semantic version without leading v (ex: 1.2.3)"
        type: string
        required: true

      changelog:
        description: "Changelog content for the release"
        type: string
        required: true

      release_title:
        description: "Optional GitHub Release title"
        type: string
        required: false
        default: ""

      release_bucket_prefix:
        description: "Bucket prefix (usually repository name)"
        required: false
        type: string
        default: ${{ github.repository }}

      env_bucket_map:
        description: "YAML mapping of environment to release bucket"
        required: false
        type: string
        default: |
          dev: vegito-app-dev-github-actions-ci-artifacts-private
          staging: vegito-app-staging-github-actions-ci-artifacts-private
          prod: vegito-app-prod-github-actions-ci-artifacts-private

    secrets:
      GOOGLE_CLOUD_PROJECT_ID:
        required: true
      WORKLOAD_IDENTITY_PROVIDER:
        required: true
      GOOGLE_CLOUD_SA_KEY_GITHUB_ACTIONS_RELEASE_READER:
        required: true

permissions:
  contents: write
  id-token: write

jobs:
  finalize:
    runs-on: self-hosted
    name: Finalize Release
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout clean
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.release_branch }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GOOGLE_CLOUD_SA_KEY_GITHUB_ACTIONS_RELEASE_READER }}
          project_id: ${{ secrets.GOOGLE_CLOUD_PROJECT_ID }}
          token_format: "access_token"
          export_environment_variables: true

      - name: Download consolidated release body from GCS
        run: |
          set -euo pipefail
          mkdir -p ./release-notes

          while IFS=":" read -r env bucket; do
            env="${env#"${env%%[![:space:]]*}"}"
            env="${env%"${env##*[![:space:]]}"}"

            bucket="${bucket#"${bucket%%[![:space:]]*}"}"
            bucket="${bucket%"${bucket##*[![:space:]]}"}"

            [[ -z "$env" || "$env" == \#* ]] && continue
            [[ -z "$bucket" ]] && continue

            if ! gcloud storage cp \
              "gs://${bucket}/${{ inputs.release_bucket_prefix }}/${{ inputs.version }}/RELEASE_BODY.md" \
              "./release-notes/RELEASE_BODY-${env}.md" ; \
            then
              echo "⚠️ Failed to fetch ${env} metadata"
            fi
          done <<< "${{ inputs.env_bucket_map }}"

          echo "${{ inputs.changelog }}" > ./release-notes/FINAL_RELEASE_BODY.md

          metadata_started=false
          for file in ./release-notes/RELEASE_BODY-*.md; do
            [ -e "$file" ] || continue

            if [ "$metadata_started" = false ]; then
              {
                echo ""
                echo "---"
                echo ""
                echo "## 🌍 Consolidated Environment Metadata"
                echo ""
              } >> ./release-notes/FINAL_RELEASE_BODY.md

              metadata_started=true
            fi

            env="${file##*/RELEASE_BODY-}"
            env="${env%.md}"

            {
              echo "### ${env}"
              echo ""
              cat "$file"
              echo ""
            } >> ./release-notes/FINAL_RELEASE_BODY.md
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "${{ inputs.version }}"
          name: ${{ inputs.release_title != '' && inputs.release_title || format('Release {0}', inputs.version) }}
          body_path: ./release-notes/FINAL_RELEASE_BODY.md
