name: Application Release Pipeline

on:
  workflow_call:
    inputs:
      environment:
        description: "The environment to deploy to (e.g., prod, staging)"
        type: string
        required: true

      version:
        description: "Semantic version without leading v (ex: 1.2.3)"
        type: string
        required: true

      changelog:
        description: "Changelog content for the release"
        type: string
        required: true

      release_title:
        description: "Optional GitHub Release title"
        type: string
        required: false
        default: ""

      release_bucket_prefix:
        description: "Bucket prefix (usually repository name)"
        required: false
        type: string
        default: ${{ github.repository }}

      env_bucket_map:
        description: "YAML mapping of environment to release bucket"
        required: true
        type: string
        default: |
          dev: vegito-app-dev-github-actions-ci-artifacts-private
          staging: vegito-app-staging-github-actions-ci-artifacts-private
          prod: vegito-app-prod-github-actions-ci-artifacts-private

    secrets:
      GOOGLE_CLOUD_PROJECT_ID:
        required: true
      GOOGLE_CLOUD_SERVICE_ACCOUNT_EMAIL:
        required: true
      GOOGLE_CLOUD_WORKLOAD_IDENTITY_PROVIDER:
        required: true

permissions:
  id-token: write
  contents: write

jobs:
  build-release-metadata:
    name: Build Release Metadata
    runs-on: self-hosted
    environment: ${{ inputs.environment }}
    env:
      VERSION: ${{ inputs.version }}
      LOCAL_ANDROID_MOBILE_KEYSTORE_SHA1_EXTRACT_PATH: android-mobile-release-${{ inputs.version }}-key.keystore.sha1
      INFRA_ENV: ${{ inputs.environment }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # --- REMPLACEMENT : Récupération du changelog directement depuis GCS ---
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GOOGLE_CLOUD_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GOOGLE_CLOUD_SERVICE_ACCOUNT_EMAIL }}
          project_id: ${{ secrets.GOOGLE_CLOUD_PROJECT_ID }}
          token_format: "access_token"
          export_environment_variables: true

      - name: Resolve release bucket from env_bucket_map
        id: resolve_bucket
        run: |
          set -euo pipefail

          resolve_bucket() {
            local target_env="$1"
            while IFS=":" read -r env bucket; do
              env="${env#"${env%%[![:space:]]*}"}"   # ltrim
              env="${env%"${env##*[![:space:]]}"}"   # rtrim
              bucket="${bucket#"${bucket%%[![:space:]]*}"}"
              bucket="${bucket%"${bucket##*[![:space:]]}"}"
              [[ -z "$env" || "$env" == \#* ]] && continue
              [[ -z "$bucket" ]] && continue
              if [ "$env" = "$target_env" ]; then
                echo "$bucket"
                return 0
              fi
            done <<< "${{ inputs.env_bucket_map }}"
            return 1
          }

          BUCKET=$(resolve_bucket "${{ inputs.environment }}") || {
            echo "❌ No bucket found for environment: ${{ inputs.environment }}"; exit 1; }

          echo "bucket=$BUCKET" >> $GITHUB_OUTPUT

      - name: Initialize release body
        run: |
          VERSION="${{ env.VERSION }}"

          echo "# 🚀 Release ${VERSION}" > RELEASE_BODY.md
          echo "" >> RELEASE_BODY.md

      - name: Append environment-specific information to changelog
        env:
          VERSION: ${{ env.VERSION }}
          BUCKET: ${{ steps.resolve_bucket.outputs.bucket }}
          PREFIX: ${{ inputs.release_bucket_prefix }}
        run: |
          set -euo pipefail

          echo "" >> RELEASE_BODY.md
          echo "## 📦 Build Artifacts (Vegito)" >> RELEASE_BODY.md
          echo "" >> RELEASE_BODY.md

          # Skip environment if no metadata exists
          if ! gcloud storage ls "gs://${BUCKET}/${PREFIX}/${VERSION}/build-metadata.json" >/dev/null 2>&1 \
            && ! gcloud storage ls "gs://${BUCKET}/${PREFIX}/${VERSION}/tests-metadata.json" >/dev/null 2>&1 \
            && ! gcloud storage ls "gs://${BUCKET}/${PREFIX}/${VERSION}/security-metadata.json" >/dev/null 2>&1; then
            echo "_No metadata found for this environment._" >> RELEASE_BODY.md
            exit 0
          fi

          echo -e "\n---\n" >> RELEASE_BODY.md
          echo "### 🌍 Environment: ${INFRA_ENV}" >> RELEASE_BODY.md
          echo "" >> RELEASE_BODY.md

          build=$(gcloud storage cat "gs://${BUCKET}/${PREFIX}/${VERSION}/build-metadata.json" 2>/dev/null || echo "{}")
          tests=$(gcloud storage cat "gs://${BUCKET}/${PREFIX}/${VERSION}/tests-metadata.json" 2>/dev/null || echo "{}")
          security=$(gcloud storage cat "gs://${BUCKET}/${PREFIX}/${VERSION}/security-metadata.json" 2>/dev/null || echo "{}")

          metadata=$(jq -s 'reduce .[] as $item ({}; . * $item)' <<<"$build $tests $security")

          if [ "$metadata" = "null" ] || [ -z "$metadata" ]; then
            echo "_No metadata found for this environment._" >> RELEASE_BODY.md
            exit 0
          fi

          apk=$(echo "$metadata" | jq -r '.android.apk // empty')
          aab=$(echo "$metadata" | jq -r '.android.aab // empty')
          sha1_url=$(echo "$metadata" | jq -r '.android.keystoreSha1 // empty')
          docker_tags_url=$(echo "$metadata" | jq -r '.dockerTags // empty')
          robot_report=$(echo "$metadata" | jq -r '.robotReport // empty')
          robot_log=$(echo "$metadata" | jq -r '.robotLog // empty')
          robot_xml=$(echo "$metadata" | jq -r '.robotXml // empty')
          thumbnail=$(echo "$metadata" | jq -r '.thumbnail // empty')
          qr=$(echo "$metadata" | jq -r '.android.qr // empty')
          security_report=$(echo "$metadata" | jq -r '.securityReport // empty')

          if [ -n "$apk" ]; then
            echo "" >> RELEASE_BODY.md
            echo "### 📱 Download and Preview" >> RELEASE_BODY.md
            echo "" >> RELEASE_BODY.md
            echo "<div style=\"display: flex; align-items: center; gap: 1.5rem; flex-wrap: wrap;\">" >> RELEASE_BODY.md
            echo "<div style=\"text-align: center;\">" >> RELEASE_BODY.md

            if [ -n "$qr" ]; then
              echo "<img src=\"$qr\" alt=\"QR Code\" width=\"140\" height=\"140\"/>" >> RELEASE_BODY.md
            fi

            echo "<div>➡️ <a href=\"$apk\">Download APK</a></div>" >> RELEASE_BODY.md
            echo "</div>" >> RELEASE_BODY.md

            if [ -n "$thumbnail" ]; then
              echo "<div>" >> RELEASE_BODY.md
              echo "<img src=\"$thumbnail\" alt=\"App Screenshot\" style=\"max-height: 160px; border: 1px solid #ccc;\"/>" >> RELEASE_BODY.md
              echo "</div>" >> RELEASE_BODY.md
            fi

            echo "</div>" >> RELEASE_BODY.md
            echo "" >> RELEASE_BODY.md
          fi

          if [ -n "$aab" ]; then
            echo "- 📦 AAB: $aab" >> RELEASE_BODY.md
          fi

          if [ -n "$sha1_url" ]; then
            echo "" >> RELEASE_BODY.md
            echo "**Android Release Keystore SHA1:**" >> RELEASE_BODY.md
            echo '```' >> RELEASE_BODY.md
            curl -s "$sha1_url" >> RELEASE_BODY.md || true
            echo '' >> RELEASE_BODY.md
            echo '```' >> RELEASE_BODY.md
          fi

          if [ -n "$docker_tags_url" ]; then
            echo "" >> RELEASE_BODY.md
            echo "**Docker images published:**" >> RELEASE_BODY.md
            curl -s "$docker_tags_url" >> RELEASE_BODY.md || true
          fi

          if [ -n "$robot_report" ]; then
            echo "" >> RELEASE_BODY.md
            echo "**Robot Framework Tests:**" >> RELEASE_BODY.md
            echo "- 🧪 Test Report: $robot_report" >> RELEASE_BODY.md
            echo "- 🧪 Test Log: $robot_log" >> RELEASE_BODY.md
            echo "- 📊 Test Output (XML): $robot_xml" >> RELEASE_BODY.md
          fi

          if [ -n "$security_report" ]; then
            echo "" >> RELEASE_BODY.md
            echo "**Security Scan Report:**" >> RELEASE_BODY.md
            echo "- 🔒 Security Report: $security_report" >> RELEASE_BODY.md
          fi

      - name: Show Release Body preview
        run: |
          cat RELEASE_BODY.md

      - name: Upload RELEASE_BODY to GCS
        run: |
          set -euo pipefail

          BUCKET="${{ steps.resolve_bucket.outputs.bucket }}"
          PREFIX="${{ inputs.release_bucket_prefix }}"
          VERSION="${{ inputs.version }}"

          gcloud storage cp \
            RELEASE_BODY.md \
            "gs://${BUCKET}/${PREFIX}/${VERSION}/RELEASE_BODY.md"
