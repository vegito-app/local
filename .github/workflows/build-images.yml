name: Build Images
on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      environment:
        required: true
        type: string

      env_bucket_map:
        description: "YAML mapping of environment to release bucket"
        required: false
        type: string
        default: |
          dev: vegito-app-dev-github-actions-ci-artifacts-private
          staging: vegito-app-staging-github-actions-ci-artifacts-private
          prod: vegito-app-prod-github-actions-ci-artifacts-private

      release_bucket_prefix:
        required: false
        type: string
        default: ${{ github.repository }}
      application_release_bucket_prefix:
        required: false
        type: string
        default: ${{ github.repository }}
      use_registry_cache:
        required: false
        type: boolean
        default: false
      android_release_keystore_path:
        required: false
        type: string
        default: .android.release-key.keystore
      android_release_keystore_alias_name:
        required: false
        type: string
        default: vegito-local-release
      images_ci_build_groups:
        required: false
        type: string
        default: "dockerhub runners builders services applications"
      dockerhub_replica_version:
        required: false
        type: string
        default: "latest"
    secrets:
      GOOGLE_CLOUD_PROJECT_ID:
        required: true
      GOOGLE_CLOUD_PROJECT_NUMBER:
        required: true
      GOOGLE_CLOUD_SA_KEY_GITHUB_ACTIONS_MAIN:
        required: true
      WORKLOAD_IDENTITY_PROVIDER:
        required: true
      ANDROID_RELEASE_KEYSTORE:
        required: false
      ANDROID_RELEASE_KEYSTORE_STORE_PASS:
        required: false
      FACEBOOK_APP_ID:
        required: false
      FACEBOOK_CLIENT_TOKEN:
        required: false

permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    name: Build and Push Images for ${{ inputs.environment }} 🧱
    runs-on: self-hosted
    environment: ${{ inputs.environment }}
    env:
      VEGITO_PROJECT_NAME: local-${{ inputs.environment }}-${{ github.ref_name }}-${{ github.run_id }}
      VEGITO_PROJECT_USER: gha-${{ github.run_id }}-${{ inputs.environment }}
      VERSION: ${{ inputs.version }}
      GOOGLE_CLOUD_PROJECT_ID: ${{ secrets.GOOGLE_CLOUD_PROJECT_ID }}
      INFRA_ENV: ${{ inputs.environment }}
      USE_REGISTRY_CACHE: ${{ inputs.use_registry_cache }}
      LOCAL_ANDROID_RELEASE_KEYSTORE_PATH: ${{ inputs.android_release_keystore_path }}
      LOCAL_ANDROID_RELEASE_KEYSTORE_BASE64_PATH: ${{ inputs.android_release_keystore_path }}.base64
      LOCAL_ANDROID_RELEASE_KEYSTORE_STORE_PASS_BASE64_PATH: ${{ inputs.android_release_keystore_path }}.storepass.base64
      LOCAL_ANDROID_RELEASE_KEYSTORE_ALIAS_NAME: ${{ inputs.android_release_keystore_alias_name }}
      LOCAL_ANDROID_FACEBOOK_APP_ID: ${{ secrets.FACEBOOK_APP_ID }}
      LOCAL_ANDROID_FACEBOOK_CLIENT_TOKEN: ${{ secrets.FACEBOOK_CLIENT_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Source dynamic env vars
        run: |
          if [ -f $GITHUB_WORKSPACE/../../gha-env-vars ]; then
          echo "📦 Loading env from $GITHUB_WORKSPACE/../../gha-env-vars"
          cat $GITHUB_WORKSPACE/../../gha-env-vars >> $GITHUB_ENV
          else
          echo "⚠️ gha-env-vars not found"
          fi

      - name: Restore ADB keys and debug.keystore
        run: |
          printf "%s" "${{ secrets.ANDROID_RELEASE_KEYSTORE }}" > ${{ env.LOCAL_ANDROID_RELEASE_KEYSTORE_BASE64_PATH }}
          printf "%s" "${{ secrets.ANDROID_RELEASE_KEYSTORE_STORE_PASS }}" > ${{ env.LOCAL_ANDROID_RELEASE_KEYSTORE_STORE_PASS_BASE64_PATH }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GOOGLE_CLOUD_SA_KEY_GITHUB_ACTIONS_MAIN }}
          project_id: ${{ secrets.GOOGLE_CLOUD_PROJECT_ID }}
          token_format: "access_token"
          export_environment_variables: true

      - name: Resolve release bucket from env_bucket_map
        id: resolve_bucket
        run: |
          set -euo pipefail

          resolve_bucket() {
            local target_env="$1"
            while IFS=":" read -r env bucket; do
              env="${env#"${env%%[![:space:]]*}"}"   # ltrim
              env="${env%"${env##*[![:space:]]}"}"   # rtrim
              bucket="${bucket#"${bucket%%[![:space:]]*}"}"
              bucket="${bucket%"${bucket##*[![:space:]]}"}"
              [[ -z "$env" || "$env" == \#* ]] && continue
              [[ -z "$bucket" ]] && continue
              if [ "$env" = "$target_env" ]; then
                echo "$bucket"
                return 0
              fi
            done <<< "${{ inputs.env_bucket_map }}"
            return 1
          }

          BUCKET=$(resolve_bucket "${{ inputs.environment }}") || {
            echo "❌ No bucket found for environment: ${{ inputs.environment }}"; exit 1; }

          echo "bucket=$BUCKET" >> $GITHUB_OUTPUT

      - name: Export VEGITO_RELEASE_BUCKET
        run: |
          echo "VEGITO_RELEASE_BUCKET=${{ steps.resolve_bucket.outputs.bucket }}/${{ inputs.release_bucket_prefix }}" >> $GITHUB_ENV

      - name: Configure Cloud SDK and Docker
        run: |
          make gcloud-config-set-project
          make gcloud-auth-docker
          make docker-buildx-setup

      - name: Build Docker image
        env:
          LOCAL_DOCKER_BUILDX_CI_BUILD_GROUPS: ${{ inputs.images_ci_build_groups }}
          DOCKERHUB_REPLICA_VERSION: ${{ inputs.dockerhub_replica_version }}
        run: |
          set -o pipefail
          make images-ci 2>&1 | tee images-build.log

      - name: Upload images-build.log to GCS
        run: |
          if ! gcloud storage cp images-build.log gs://${{ env.VEGITO_RELEASE_BUCKET }}/${{ inputs.version }}/images-build.log; then
            echo "::warning::failed to upload images-build.log"
          fi

      - name: Generate docker image tag list for ${{ inputs.environment }}
        id: docker_tags
        run: |
          make docker-build-tags-list-ci-md > docker-tags.md
          if ! gcloud storage cp docker-tags.md gs://${{ env.VEGITO_RELEASE_BUCKET }}/${{ inputs.version }}/docker-tags.md; then
            echo "::warning::failed to upload docker-tags.md"
          fi

      - name: Cleanup Sensitive Files
        if: always()
        run: |
          # Suppression sécurisée des fichiers sensibles
          shred -u ${{ env.LOCAL_ANDROID_RELEASE_KEYSTORE_BASE64_PATH }}* || true

      - name: Generate metadata.json and QR code
        run: |
          set -euo pipefail

          BASE="gs://${VEGITO_RELEASE_BUCKET}/${VERSION}"

          BUILD_LOG="https://storage.googleapis.com/${VEGITO_RELEASE_BUCKET}/${VERSION}/images-build.log"
          DOCKER_TAGS="https://storage.googleapis.com/${VEGITO_RELEASE_BUCKET}/${VERSION}/docker-tags.md"

          cat <<EOF > build-metadata.json
          {
            "buildImagesLog": "${BUILD_LOG}",
            "dockerTags": "${DOCKER_TAGS}"
          }
          EOF

          gcloud storage cp build-metadata.json ${BASE}/build-metadata.json

  upload-android-artifacts:
    needs: build-and-push
    name: Upload Android Release Artifacts for ${{ inputs.environment }} 🧱
    runs-on: self-hosted
    environment: ${{ inputs.environment }}
    env:
      VEGITO_PROJECT_NAME: local-${{ inputs.environment }}-${{ github.ref }}-${{ github.run_id }}
      VEGITO_PROJECT_USER: gha-${{ github.run_id }}-${{ inputs.environment }}
      VERSION: ${{ inputs.version }}
      GOOGLE_CLOUD_PROJECT_ID: ${{ secrets.GOOGLE_CLOUD_PROJECT_ID }}
      INFRA_ENV: ${{ inputs.environment }}
      LOCAL_ANDROID_MOBILE_IMAGE_APK_RELEASE_EXTRACT_PATH: android-mobile-release-${{ inputs.version }}-signed-aligned.apk
      LOCAL_ANDROID_MOBILE_IMAGE_AAB_RELEASE_EXTRACT_PATH: android-mobile-release-${{ inputs.version }}-signed.aab
      LOCAL_ANDROID_MOBILE_KEYSTORE_SHA1_EXTRACT_PATH: android-mobile-release-${{ inputs.version }}-key.keystore.sha1
      VEGITO_RELEASE_BUCKET: ""
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Source dynamic env vars
        run: |
          if [ -f $GITHUB_WORKSPACE/../../gha-env-vars ]; then
          echo "📦 Loading env from $GITHUB_WORKSPACE/../../gha-env-vars"
          cat $GITHUB_WORKSPACE/../../gha-env-vars >> $GITHUB_ENV
          else
          echo "⚠️ gha-env-vars not found"
          fi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GOOGLE_CLOUD_SA_KEY_GITHUB_ACTIONS_MAIN }}
          project_id: ${{ secrets.GOOGLE_CLOUD_PROJECT_ID }}
          token_format: "access_token"
          export_environment_variables: true

      - name: Resolve release bucket from env_bucket_map
        id: resolve_bucket
        run: |
          set -euo pipefail

          resolve_bucket() {
            local target_env="$1"
            while IFS=":" read -r env bucket; do
              env="${env#"${env%%[![:space:]]*}"}"   # ltrim
              env="${env%"${env##*[![:space:]]}"}"   # rtrim
              bucket="${bucket#"${bucket%%[![:space:]]*}"}"
              bucket="${bucket%"${bucket##*[![:space:]]}"}"
              [[ -z "$env" || "$env" == \#* ]] && continue
              [[ -z "$bucket" ]] && continue
              if [ "$env" = "$target_env" ]; then
                echo "$bucket"
                return 0
              fi
            done <<< "${{ inputs.env_bucket_map }}"
            return 1
          }

          BUCKET=$(resolve_bucket "${{ inputs.environment }}") || {
            echo "❌ No bucket found for environment: ${{ inputs.environment }}"; exit 1; }

          echo "bucket=$BUCKET" >> $GITHUB_OUTPUT

      - name: Export VEGITO_RELEASE_BUCKET
        run: |
          echo "VEGITO_RELEASE_BUCKET=${{ steps.resolve_bucket.outputs.bucket }}/${{ inputs.release_bucket_prefix }}" >> $GITHUB_ENV

      - name: Ensure fresh .env
        run: |
          rm -f .env
          make dotenv

      - name: Extract signed APK & AAB releases and keystore SHA1 from images
        id: extract_apk_aab
        run: |
          if make -qp 2>/dev/null | grep -q "^application-mobile-image-extract-android-artifacts:"; then
            echo "📦 Android artifacts target detected — extracting artifacts"
            make application-mobile-image-extract-android-artifacts
          else
            echo "ℹ️ No Android mobile build in this repository — skipping extraction"
            touch ${{ env.LOCAL_ANDROID_MOBILE_IMAGE_APK_RELEASE_EXTRACT_PATH }} \
                  ${{ env.LOCAL_ANDROID_MOBILE_IMAGE_AAB_RELEASE_EXTRACT_PATH }} \
                  ${{ env.LOCAL_ANDROID_MOBILE_KEYSTORE_SHA1_EXTRACT_PATH }} || true
          fi

      - name: Upload signed APK, AAB, and keystore SHA1 to GCS
        run: |
          if ! gcloud storage cp "${{ env.LOCAL_ANDROID_MOBILE_IMAGE_APK_RELEASE_EXTRACT_PATH }}" gs://${{ env.VEGITO_RELEASE_BUCKET }}/${{ inputs.version }}/android-mobile-release-${{ inputs.version }}-signed-aligned.apk; then
            echo "::warning::APK upload failed"
          fi

          if ! gcloud storage cp "${{ env.LOCAL_ANDROID_MOBILE_IMAGE_AAB_RELEASE_EXTRACT_PATH }}" gs://${{ env.VEGITO_RELEASE_BUCKET }}/${{ inputs.version }}/android-mobile-release-${{ inputs.version }}-signed.aab; then
            echo "::warning::AAB upload failed"
          fi

          if ! gcloud storage cp "${{ env.LOCAL_ANDROID_MOBILE_KEYSTORE_SHA1_EXTRACT_PATH }}" gs://${{ env.VEGITO_RELEASE_BUCKET }}/${{ inputs.version }}/android-mobile-release-${{ inputs.version }}-key.keystore.sha1; then
            echo "::warning::Keystore SHA1 upload failed"
          fi

      - name: Generate metadata.json and QR code
        run: |
          set -euo pipefail

          BASE="gs://${VEGITO_RELEASE_BUCKET}/${VERSION}"

          APK="https://storage.googleapis.com/${VEGITO_RELEASE_BUCKET}/${VERSION}/android-mobile-release-${VERSION}-signed-aligned.apk"
          AAB="https://storage.googleapis.com/${VEGITO_RELEASE_BUCKET}/${VERSION}/android-mobile-release-${VERSION}-signed.aab"
          SHA1="https://storage.googleapis.com/${VEGITO_RELEASE_BUCKET}/${VERSION}/android-mobile-release-${VERSION}-key.keystore.sha1"

          mkdir -p artifacts

          # Generate QR code only if APK exists
          if gcloud storage ls "${BASE}/android-mobile-release-${VERSION}-signed-aligned.apk" >/dev/null 2>&1; then
            qrencode -o artifacts/qr-code.png "$APK"
            gcloud storage cp artifacts/qr-code.png ${BASE}/qr-code.png || true
            QR="https://storage.googleapis.com/${VEGITO_RELEASE_BUCKET}/${VERSION}/qr-code.png"
          else
            QR=""
          fi

          # Detect and upload thumbnail preview if present
          THUMBNAIL_FILE="android-mobile-preview.png"
          if [ -f "$THUMBNAIL_FILE" ]; then
            gcloud storage cp "$THUMBNAIL_FILE" ${BASE}/android-mobile-preview.png || true
            THUMBNAIL="https://storage.googleapis.com/${VEGITO_RELEASE_BUCKET}/${VERSION}/android-mobile-preview.png"
          else
            THUMBNAIL=""
          fi

          # Download existing metadata if present
          gcloud storage cp "${BASE}/build-metadata.json" existing-build-metadata.json 2>/dev/null || echo "{}" > existing-build-metadata.json

          # Android-specific metadata
          jq -n \
            --arg apk "$APK" \
            --arg aab "$AAB" \
            --arg sha1 "$SHA1" \
            --arg qr "$QR" \
            --arg thumb "$THUMBNAIL" \
          '{
            android: (
              {
                apk: $apk,
                aab: $aab,
                keystoreSha1: $sha1,
                qr: $qr,
                thumbnail: $thumb
              }
              | with_entries(select(.value != ""))
            )
          }
          | if (.android | length) == 0 then del(.android) else . end' \
          > android-metadata.json

          # Merge existing metadata with Android metadata
          jq -s '.[0] * .[1]' existing-build-metadata.json android-metadata.json > build-metadata.json

          # Upload merged metadata
          gcloud storage cp build-metadata.json ${BASE}/build-metadata.json
