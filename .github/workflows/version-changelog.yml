name: Version Changelog (Reusable)

on:
  workflow_call:
    outputs:
      version:
        description: "Computed semantic version"
        value: ${{ jobs.calc.outputs.version }}
      changelog:
        description: "Generated changelog content"
        value: ${{ jobs.calc.outputs.changelog }}

permissions:
  contents: read

jobs:
  calc:
    name: Calculate Version and Changelog
    runs-on: self-hosted
    outputs:
      version: ${{ steps.define_version.outputs.VERSION }}
      changelog: ${{ steps.define_version.outputs.CHANGELOG_NEW }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Define VERSION and Tag 🏷
        id: define_version
        run: |
          set -euo pipefail

          git config --global user.name "GitHub Action"
          git config --global user.email "build-and-push-images-action@github.com"

          git fetch --tags

          echo "🔧 Running standard-version (source of truth)"

          standard-version

          VERSION=$(git describe --tags --abbrev=0 --match 'v*')

          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT

          echo "## Changelog for ${VERSION}" > CHANGELOG.new.md

          conventional-changelog -p angular -r 1 >> CHANGELOG.new.md

          if [ -f CHANGELOG.md ]; then
            cat CHANGELOG.md >> CHANGELOG.new.md
          fi

          mv CHANGELOG.new.md CHANGELOG.md

          echo "CHANGELOG_NEW<<EOF" >> $GITHUB_OUTPUT
          cat CHANGELOG.md >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          echo "📦 Prepared version: $VERSION (commit + tag local, not pushed yet)"

      - run: echo "📦 Version = ${{ steps.define_version.outputs.VERSION }}"
      - name: Show New Changes log
        run: |
          echo "📝 Changelog:"
          echo " ${{ steps.define_version.outputs.CHANGELOG_NEW }}"
