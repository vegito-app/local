name: Version Changelog (Reusable)

on:
  workflow_call:
    outputs:
      version:
        description: "Computed semantic version"
        value: ${{ jobs.calc.outputs.version }}
      changelog:
        description: "Generated changelog content"
        value: ${{ jobs.calc.outputs.changelog }}
      commit_sha:
        description: "Commit SHA of the release commit"
        value: ${{ jobs.calc.outputs.commit_sha }}

permissions:
  contents: write

jobs:
  calc:
    name: Calculate Version and Changelog
    runs-on: self-hosted
    outputs:
      version: ${{ steps.define_version.outputs.VERSION }}
      changelog: ${{ steps.define_version.outputs.CHANGELOG_NEW }}
      commit_sha: ${{ steps.define_version.outputs.COMMIT_SHA }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Define VERSION and Tag 🏷
        id: define_version
        run: |
          set -euo pipefail

          git fetch --tags

          echo "🔧 Running standard-version (source of truth)"

          standard-version

          VERSION=$(git describe --tags --abbrev=0 --match 'v*')

          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT

          LAST_TAG=$(git describe --tags --abbrev=0 HEAD^)

          echo "## Changelog for ${VERSION}" > CHANGELOG.new.md
          echo "" >> CHANGELOG.new.md

          CHANGES=$(git log ${LAST_TAG}..HEAD --pretty=format:"* %s (%h)")

          if [ -z "$CHANGES" ]; then
            CHANGES="* No changes in this release"
          fi

          echo "$CHANGES" >> CHANGELOG.new.md

          mv CHANGELOG.new.md CHANGELOG.md

          echo "CHANGELOG_NEW<<EOF" >> $GITHUB_OUTPUT
          cat CHANGELOG.md >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          COMMIT_SHA=$(git rev-parse HEAD)

          git push origin "refs/tags/${VERSION}"
          echo "COMMIT_SHA=${COMMIT_SHA}" >> $GITHUB_OUTPUT

          echo "📦 Prepared version: $VERSION (commit + tag local, not pushed yet)"

      - run: echo "📦 Version = ${{ steps.define_version.outputs.VERSION }}"
      - name: Show New Changes log
        run: |
          echo "📝 Changelog:"
          printf "%s\n" "${{ steps.define_version.outputs.CHANGELOG_NEW }}"
