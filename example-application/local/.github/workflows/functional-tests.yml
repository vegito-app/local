name: Functional Tests
on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string

      environment:
        required: true
        type: string

      functional-tests-output-dir:
        required: false
        type: string
        default: "tests/output"

      local-android-container-name:
        required: false
        type: string
        default: "android-studio-emulator"

      env_bucket_map:
        description: "YAML mapping of environment to release bucket"
        required: false
        type: string
        default: |
          dev: vegito-app-dev-github-actions-ci-artifacts-private
          staging: vegito-app-staging-github-actions-ci-artifacts-private
          prod: vegito-app-prod-github-actions-ci-artifacts-private

      release_bucket_prefix:
        required: false
        type: string
        default: ${{ github.repository }}

    secrets:
      GOOGLE_CLOUD_PROJECT_ID:
        required: true
      WORKLOAD_IDENTITY_PROVIDER:
        required: true
      GOOGLE_CLOUD_SA_KEY_GITHUB_ACTIONS_MAIN:
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  run-local-tests:
    name: Run Tests ${{ inputs.environment }} ✅
    runs-on: self-hosted
    environment: ${{ inputs.environment }}
    env:
      VEGITO_PROJECT_NAME: local-${{ inputs.environment }}-${{ github.ref }}-${{ github.run_id }}
      VEGITO_PROJECT_USER: gha-${{ github.run_id }}-${{ inputs.environment }}
      INFRA_ENV: ${{ inputs.environment }}
      LOCAL_ANDROID_EMULATOR_SCREENSHOT_PATH: android-mobile-${{ inputs.environment }}-${{ inputs.version }}-screenshot.png
      VERSION: ${{ inputs.version }}
      GOOGLE_CLOUD_PROJECT_ID: ${{ secrets.GOOGLE_CLOUD_PROJECT_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GOOGLE_CLOUD_SA_KEY_GITHUB_ACTIONS_MAIN }}
          project_id: ${{ secrets.GOOGLE_CLOUD_PROJECT_ID }}
          token_format: "access_token"
          export_environment_variables: true

      - name: Ensure fresh .env
        run: |
          rm -f .env
          make dotenv

      - name: Resolve release bucket from env_bucket_map
        id: resolve_bucket
        run: |
          set -euo pipefail

          resolve_bucket() {
            local target_env="$1"
            while IFS=":" read -r env bucket; do
              env="${env#"${env%%[![:space:]]*}"}"   # ltrim
              env="${env%"${env##*[![:space:]]}"}"   # rtrim
              bucket="${bucket#"${bucket%%[![:space:]]*}"}"
              bucket="${bucket%"${bucket##*[![:space:]]}"}"
              [[ -z "$env" || "$env" == \#* ]] && continue
              [[ -z "$bucket" ]] && continue
              if [ "$env" = "$target_env" ]; then
                echo "$bucket"
                return 0
              fi
            done <<< "${{ inputs.env_bucket_map }}"
            return 1
          }

          BUCKET=$(resolve_bucket "${{ inputs.environment }}") || {
            echo "❌ No bucket found for environment: ${{ inputs.environment }}"; exit 1; }

          echo "bucket=$BUCKET" >> $GITHUB_OUTPUT

      - name: Setup Docker Environment
        run: |
          set -euo pipefail
          (
            make gcloud-config-set-project
            make docker-login
            make local-container-config-show
            make dev-ci
          ) 2>&1 | tee setup.log
      - name: Run Application Tests
        run: |
          set -euo pipefail
          make functional-tests-ci 2>&1 | tee tests.log

      - name: Generate Mobile Preview Screenshot
        run: |
          make application-mobile-screenshot
          mv ${{ env.LOCAL_ANDROID_EMULATOR_SCREENSHOT_PATH }} android-mobile-preview.png

      - name: Upload Mobile Preview Screenshot to GCS
        env:
          VERSION: ${{ env.VERSION }}
          BUCKET: ${{ steps.resolve_bucket.outputs.bucket }}
          PREFIX: ${{ inputs.release_bucket_prefix }}

        run: |
          gs_path="gs://${BUCKET}/${PREFIX}/${VERSION}"
          DEST="${gs_path}/android-mobile-preview.png"
          echo "Uploading android-mobile-preview.png to $DEST"
          gcloud storage cp android-mobile-preview.png "$DEST"

      - name: Publish tests metadata
        env:
          VERSION: ${{ env.VERSION }}
          BUCKET: ${{ steps.resolve_bucket.outputs.bucket }}
          PREFIX: ${{ inputs.release_bucket_prefix }}
        run: |
          set -euo pipefail

          BASE="gs://${BUCKET}/${PREFIX}/${VERSION}"

          THUMB="https://storage.googleapis.com/${BUCKET}/${PREFIX}/${VERSION}/android-mobile-preview.png"
          REPORT="https://storage.googleapis.com/${BUCKET}/${PREFIX}/${VERSION}/functional-tests/output/report.html"
          LOG="https://storage.googleapis.com/${BUCKET}/${PREFIX}/${VERSION}/functional-tests/output/log.html"
          XML="https://storage.googleapis.com/${BUCKET}/${PREFIX}/${VERSION}/functional-tests/output/output.xml"

          cat <<EOF > tests-metadata.json
          {
            "thumbnail": "${THUMB}",
            "robotReport": "${REPORT}",
            "robotLog": "${LOG}",
            "robotXml": "${XML}"
          }
          EOF

          gcloud storage cp tests-metadata.json ${BASE}/tests-metadata.json

      - name: Collect Docker Containers Logs
        run: |
          make containers-logs-ci 2>&1 > containers.log

      - name: Upload Logs to GCS
        env:
          VERSION: ${{ env.VERSION }}
          BUCKET: ${{ steps.resolve_bucket.outputs.bucket }}
          PREFIX: ${{ inputs.release_bucket_prefix }}
        if: always()
        run: |
          gs_path="gs://${BUCKET}/${PREFIX}/${VERSION}/functional-tests" 
          if ! gcloud storage cp containers.log ${gs_path}/containers.log; then
            echo "::warning::Failed to upload containers.log to GCS for env=${INFRA_ENV}, version=${VERSION}"
          fi
          if ! gcloud storage cp setup.log ${gs_path}/setup.log; then
            echo "::warning::Failed to upload setup.log to GCS for env=${INFRA_ENV}, version=${VERSION}"
          fi
          if ! gcloud storage cp tests.log ${gs_path}/tests.log; then
            echo "::warning::Failed to upload tests.log to GCS for env=${INFRA_ENV}, version=${VERSION}"
          fi

      - name: Upload Test Results to GCS
        if: always()
        env:
          VERSION: ${{ env.VERSION }}
          BUCKET: ${{ steps.resolve_bucket.outputs.bucket }}
          PREFIX: ${{ inputs.release_bucket_prefix }}
        run: |
          gs_path="gs://${BUCKET}/${PREFIX}/${VERSION}/functional-tests/output"
          gcloud storage cp \
            --content-type=text/html \
            ${{ inputs.functional-tests-output-dir }}/report.html \
            ${gs_path}/report.html || true
          gcloud storage cp \
            --content-type=text/html \
            ${{ inputs.functional-tests-output-dir }}/log.html \
            ${gs_path}/log.html || true
          gcloud storage cp \
            --content-type=application/xml \
            ${{ inputs.functional-tests-output-dir }}/output.xml \
            ${gs_path}/output.xml || true

      - name: Cleanup Docker Environment
        if: always()
        run: |
          make dev-ci-rm
